
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>词频可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; margin: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .chart-box {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            width: 600px;
            height: 450px;
        }
        h2 { text-align: center; margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">歌词词频分析</h1>
    <div class="container">
        <div class="chart-box">
            <h2>词云</h2>
            <div id="wordcloud" style="width:560px;height:400px;"></div>
        </div>
        <div class="chart-box">
            <h2>高频词柱状图</h2>
            <div id="bar" style="width:100%; height:400px;"></div>
        </div>
    </div>
    <script>
        // ----- 词云（ECharts 扩展）-----
        const cloudData = [{"name":"停下来","value":26},{"name":"的","value":17},{"name":"和","value":15},{"name":"爱情","value":8},{"name":"停止","value":6},{"name":"都","value":6},{"name":"会","value":5},{"name":"进化","value":5},{"name":"将","value":4},{"name":"也好","value":4},{"name":"这样","value":4},{"name":"呢","value":4},{"name":"归咎于","value":3},{"name":"归罪于","value":3},{"name":"是","value":3},{"name":"曾经","value":3},{"name":"不要","value":3},{"name":"满溢","value":3},{"name":"在","value":3},{"name":"人类","value":2},{"name":"什么","value":2},{"name":"苹果","value":2},{"name":"景色","value":2},{"name":"这里","value":2},{"name":"变成","value":2},{"name":"红色","value":2},{"name":"宣誓","value":2},{"name":"啊呀","value":2},{"name":"Yes","value":2},{"name":"究竟","value":2},{"name":"幸福","value":2},{"name":"为什么","value":2},{"name":"地","value":2},{"name":"未来","value":2},{"name":"拜","value":2},{"name":"了","value":2},{"name":"有","value":2},{"name":"请","value":2},{"name":"恋人们","value":2},{"name":"你","value":2},{"name":"过","value":2},{"name":"吧","value":2},{"name":"一对","value":1},{"name":"陆海空","value":1},{"name":"吃","value":1},{"name":"天空","value":1},{"name":"见到","value":1},{"name":"DNA","value":1},{"name":"一定","value":1},{"name":"故事","value":1}];
        const cloudChart = echarts.init(document.getElementById('wordcloud'));
        cloudChart.setOption({
            series: [{
                type: 'wordCloud',
                gridSize: 8,
                sizeRange: [12, 60],
                rotationRange: [-90, 90],
                shape: 'circle',
                width: 560,
                height: 400,
                textStyle: {
                    fontFamily: 'Microsoft YaHei, sans-serif',
                    fontWeight: 'bold',
                    color: function () {
                        return 'rgb(' + [Math.round(Math.random() * 160) + 40, Math.round(Math.random() * 160) + 40, Math.round(Math.random() * 160) + 40].join(',') + ')';
                    }
                },
                data: cloudData.map(item => ({ name: item.name, value: item.value }))
            }]
        });

        // ----- 柱状图 -----
        const barChart = echarts.init(document.getElementById('bar'));
        barChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: {
                left: '10%',
                right: '5%',
                top: '10%',
                bottom: '30%'
            },
            xAxis: {
                type: 'category',
                data: ["停下来","的","和","爱情","停止","都","会","进化","将","也好","这样","呢","归咎于","归罪于","是","曾经","不要","满溢","在","人类"],
                axisLabel: {
                    interval: 0,
                    fontSize: 10,
                    formatter: function (value) {
                        return value.split('').join('\n');
                    }
                }
            },
            yAxis: {
                type: 'value',
                name: '出现次数'
            },
            series: [{
                name: '词频',
                type: 'bar',
                data: [26,17,15,8,6,6,5,5,4,4,4,4,3,3,3,3,3,3,3,2],
                barWidth: '30%',
                itemStyle: { color: '#5470c6' }
            }]
        });

        // 窗口大小变化时自适应
        window.addEventListener('resize', function() {
            cloudChart.resize();
            barChart.resize();
        });
    </script>
</body>
</html>
