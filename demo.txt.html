
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>词频可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #1a1a2e; font-size: 28px; margin: 0; }
        .header p { color: #666; font-size: 14px; margin: 4px 0 0 0; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; max-width: 1300px; margin: 0 auto; }
        .chart-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 24px;
            flex: 1 1 560px;
            max-width: 640px;
            min-width: 400px;
        }
        .chart-box h2 {
            text-align: center;
            margin: 0 0 16px 0;
            color: #333;
            font-size: 18px;
            border-bottom: 2px solid #5470c6;
            padding-bottom: 8px;
        }
        .chart { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 歌词词频分析</h1>
        <p>基于 ECharts 的词频可视化</p>
    </div>
    <div class="container">
        <div class="chart-box">
            <h2>词云</h2>
            <div id="wordcloud" class="chart"></div>
        </div>
        <div class="chart-box">
            <h2>高频词柱状图</h2>
            <div id="bar" class="chart"></div>
        </div>
    </div>
    <script>
        const cloudData = [{"name":"停下来","value":26},{"name":"的","value":17},{"name":"和","value":15},{"name":"爱情","value":8},{"name":"停止","value":6},{"name":"都","value":6},{"name":"进化","value":5},{"name":"会","value":5},{"name":"这样","value":4},{"name":"将","value":4},{"name":"也好","value":4},{"name":"呢","value":4},{"name":"归罪于","value":3},{"name":"满溢","value":3},{"name":"曾经","value":3},{"name":"在","value":3},{"name":"归咎于","value":3},{"name":"是","value":3},{"name":"不要","value":3},{"name":"有","value":2},{"name":"恋人们","value":2},{"name":"过","value":2},{"name":"了","value":2},{"name":"请","value":2},{"name":"红色","value":2},{"name":"景色","value":2},{"name":"幸福","value":2},{"name":"Yes","value":2},{"name":"人类","value":2},{"name":"吧","value":2},{"name":"苹果","value":2},{"name":"未来","value":2},{"name":"宣誓","value":2},{"name":"变成","value":2},{"name":"拜","value":2},{"name":"究竟","value":2},{"name":"地","value":2},{"name":"啊呀","value":2},{"name":"为什么","value":2},{"name":"你","value":2},{"name":"什么","value":2},{"name":"这里","value":2},{"name":"之后","value":1},{"name":"Sequenz","value":1},{"name":"吃","value":1},{"name":"已经","value":1},{"name":"声音","value":1},{"name":"总有一天","value":1},{"name":"by","value":1},{"name":"善","value":1}];
        const cloudChart = echarts.init(document.getElementById('wordcloud'));
        cloudChart.setOption({
            series: [{
                type: 'wordCloud',
                gridSize: 8,
                sizeRange: [14, 65],
                rotationRange: [-90, 90],
                rotationStep: 45,
                shape: 'circle',
                width: '90%',
                height: '90%',
                left: 'center',
                top: 'center',
                textStyle: {
                    fontFamily: 'Microsoft YaHei, sans-serif',
                    fontWeight: 'bold',
                    color: function () {
                        return 'rgb(' + [
                            Math.round(Math.random() * 120 + 60),
                            Math.round(Math.random() * 120 + 60),
                            Math.round(Math.random() * 120 + 60)
                        ].join(',') + ')';
                    }
                },
                data: cloudData.map(function(item) {
                    return { name: item.name, value: item.value };
                })
            }]
        });

        const barChart = echarts.init(document.getElementById('bar'));
        barChart.setOption({
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            grid: {
                left: '8%',
                right: '8%',
                top: '5%',
                bottom: '15%'
            },
            xAxis: {
                type: 'category',
                data: ["停下来","的","和","爱情","停止","都","进化","会","这样","将","也好","呢","归罪于","满溢","曾经","在","归咎于","是","不要","有"],
                axisLabel: {
                    interval: 0,
                    rotate: 0,
                    fontSize: 11,
                    formatter: function (value) {
                        return value.length > 4
                            ? value.substring(0, 4) + '\\n' + value.substring(4)
                            : value;
                    }
                }
            },
            yAxis: {
                type: 'value',
                name: '出现次数',
                nameTextStyle: { fontSize: 12 }
            },
            series: [{
                name: '词频',
                type: 'bar',
                data: [26,17,15,8,6,6,5,5,4,4,4,4,3,3,3,3,3,3,3,2],
                barWidth: '50%',
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#667eea' },
                        { offset: 1, color: '#5470c6' }
                    ]),
                    borderRadius: [4, 4, 0, 0]
                }
            }]
        });

        window.addEventListener('resize', function() {
            cloudChart.resize();
            barChart.resize();
        });
    </script>
</body>
</html>
